<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 HumanChat — Чат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .room-code {
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
        }
        .room-code button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            margin-left: 8px;
        }
        .users-count {
            font-size: 12px;
            opacity: 0.8;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }
        .message.own {
            align-self: flex-end;
        }
        .message-username {
            font-size: 11px;
            color: #666;
            margin-bottom: 4px;
            padding-left: 8px;
        }
        .message-bubble {
            background: white;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 14px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message.own .message-bubble {
            background: #667eea;
            color: white;
        }
        .message-time {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
            padding-left: 8px;
        }
        .typing-indicator {
            padding: 8px 20px;
            color: #666;
            font-size: 12px;
            font-style: italic;
        }
        .input-area {
            background: white;
            padding: 16px 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
        }
        .input-area input:focus {
            border-color: #667eea;
        }
        .input-area button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
        }
        .info-message {
            text-align: center;
            color: #999;
            font-size: 12px;
            padding: 8px;
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <div>
            <strong>💬 HumanChat</strong>
            <div class="users-count" id="usersCount">— онлайн</div>
        </div>
        <div class="room-code">
            Код: <span id="roomCode">...</span>
            <button onclick="copyRoomCode()">📋</button>
        </div>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="info-message">✨ Подключение к чату...</div>
    </div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Напиши сообщение..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Отправить</button>
    </div>

    <!-- Firebase SDK (Compat версия) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script>
        // ТВОЙ КОНФИГ FIREBASE (тот же самый)
        const firebaseConfig = {
            apiKey: "AIzaSyBIvRdZrTgzVSEyU7s8boXITTOWwjg_6mU",
            authDomain: "human-chat-2910b.firebaseapp.com",
            databaseURL: "https://human-chat-2910b-default-rtdb.firebaseio.com",
            projectId: "human-chat-2910b",
            storageBucket: "human-chat-2910b.firebasestorage.app",
            messagingSenderId: "622993816871",
            appId: "1:622993816871:web:3c77c3f4aaea5ebf533d02",
            measurementId: "G-XSLJFYGBL2"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Получаем параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        const username = localStorage.getItem('chat_username') || 'Аноним';
        
        let messageTimeout = null;

        document.getElementById('roomCode').textContent = roomId;

        // Ссылки на базу данных
        const roomRef = database.ref(`rooms/${roomId}`);
        const messagesRef = roomRef.child('messages');
        const usersRef = roomRef.child('users');
        const typingRef = roomRef.child('typing');

        // Добавляем пользователя
        usersRef.child(username).set(true);
        usersRef.on('value', (snapshot) => {
            const count = snapshot.numChildren();
            document.getElementById('usersCount').textContent = `${count} онлайн`;
        });

        // Отслеживаем уход пользователя
        window.addEventListener('beforeunload', () => {
            usersRef.child(username).remove();
            if (messageTimeout) clearTimeout(messageTimeout);
            typingRef.child(username).remove();
        });

        // Слушаем новые сообщения
        messagesRef.limitToLast(50).on('child_added', (snapshot) => {
            const msg = snapshot.val();
            addMessageToUI(msg);
        });

        // Печатает...
        typingRef.on('value', (snapshot) => {
            const typingUsers = snapshot.val();
            if (!typingUsers) {
                document.getElementById('typingIndicator').textContent = '';
                return;
            }
            const names = Object.keys(typingUsers).filter(n => n !== username);
            if (names.length === 0) {
                document.getElementById('typingIndicator').textContent = '';
            } else if (names.length === 1) {
                document.getElementById('typingIndicator').textContent = `${names[0]} печатает...`;
            } else {
                document.getElementById('typingIndicator').textContent = `${names.length} человек печатают...`;
            }
        });

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            const message = {
                username: username,
                text: text,
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                timestamp: Date.now()
            };
            
            messagesRef.push(message);
            input.value = '';
            
            if (messageTimeout) {
                clearTimeout(messageTimeout);
                messageTimeout = null;
            }
            typingRef.child(username).remove();
        }

        function handleTyping() {
            typingRef.child(username).set(true);
            if (messageTimeout) clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => {
                typingRef.child(username).remove();
            }, 1000);
        }

        function addMessageToUI(msg) {
            const container = document.getElementById('messagesContainer');
            const isOwn = msg.username === username;
            
            if (container.children.length === 1 && container.children[0].classList?.contains('info-message')) {
                container.innerHTML = '';
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwn ? 'own' : ''}`;
            messageDiv.innerHTML = `
                <div class="message-username">${escapeHtml(msg.username)}</div>
                <div class="message-bubble">${escapeHtml(msg.text)}</div>
                <div class="message-time">${msg.time}</div>
            `;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyRoomCode() {
            navigator.clipboard.writeText(roomId);
            const btn = event.target;
            btn.textContent = '✅';
            setTimeout(() => btn.textContent = '📋', 1500);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            } else {
                handleTyping();
            }
        }

        const inputEl = document.getElementById('messageInput');
        inputEl.addEventListener('input', handleTyping);
    </script>
</body>
</html>
